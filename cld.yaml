# All fields are optional; commented values show the defaults.

# Directory for disposable data: binary cache and sockets.
#cache_dir: ~/.cache/cld
# Directory for data that must not be lost: conversation backups.
#data_dir: ~/.local/share/cld

# Glob patterns matched against the host-side workspace path
# (the "devcontainer.local_folder" label) to exclude from provisioning.
# "**" crosses path separators; a leading "~/" expands to the home directory.
#ignore:
#  - ~/work/vendor/**

auth:
  # Path to a host file holding a Claude Code OAuth token (from
  # `claude setup-token`). When set, the token is injected into each session
  # so a fresh container needs no interactive login — this is what lets you
  # drop the "~/.claude" bind mount from your devcontainers. Keep it 0600;
  # only the path (never the token) appears in the tmux command.
  #oauth_token_file: ~/.config/cld/oauth-token

  # Relay the host ssh-agent into each session (SSH_AUTH_SOCK), so `git commit`
  # can sign and SSH pushes work inside the container — like VS Code Dev
  # Containers. Enabled by default; set false to keep the agent off-limits to
  # container code.
  #forward_agent: true

  # Copy your host-level Claude Code config into each session so a devcontainer
  # behaves like your host claude: ~/.claude/settings.json, the personal
  # CLAUDE.md, and the commands/, agents/, and output-styles/ directories.
  # settings.json is sanitized first — secret/host-only keys are dropped so they
  # never cross into the container (env, the apiKeyHelper/aws*/otel auth helpers,
  # the project-MCP auto-trust flags); model, permissions, hooks and presentation
  # keys carry over. The credentials file, project history, and runtime state are
  # never copied. Staged on `cld it`/`cld up`. Enabled by default; set false to
  # keep containers on cld's minimal seed only.
  #share_config: true

release:
  # Base URL of the Claude Code release channel.
  #base_url: https://downloads.claude.ai/claude-code-releases
  # Release channel to follow: "stable" or "latest".
  #channel: stable
  # How often to check the channel for a new version.
  #check_interval: 1h

sync:
  # Delay after a change before conversation state is copied out.
  #debounce: 3s
  # Polling interval used when the in-container watcher cannot run
  # (container architecture differs from the host).
  #fallback_interval: 1m
