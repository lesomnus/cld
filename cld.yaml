# All fields are optional; commented values show the defaults.

# Directory for disposable data: binary cache and sockets.
#cache_dir: ~/.cache/cld
# Directory for data that must not be lost: conversation backups and your
# user-default Claude Code config (see auth.share_config below).
#data_dir: ~/.local/share/cld

# Glob patterns matched against the host-side workspace path
# (the "devcontainer.local_folder" label) to exclude from provisioning.
# "**" crosses path separators; a leading "~/" expands to the home directory.
#ignore:
#  - ~/work/vendor/**

auth:
  # By default each container logs in for itself: run `claude` inside it and
  # complete the login once. cld persists that login (.credentials.json) to the
  # project's isolated backup and restores it whenever the container is
  # recreated, so you log in only once per project — and, because the backup is
  # per-project, one container's rotating token never clobbers another's.
  #
  # To instead share ONE Claude subscription across sessions, run `cld auth
  # login` (the daemon owns and centrally refreshes the login) and opt the
  # projects that should use it in with `cld up --proxy` / `cld it --proxy`.
  # Those sessions authenticate through the daemon's proxy with only short-lived
  # access tokens (no refresh token ever enters a container). The proxy is
  # opt-in because it points ANTHROPIC_BASE_URL at a non-first-party endpoint,
  # which makes Claude Code degrade its UI and disable some features; switch a
  # project back with `--no-proxy`. Neither path is configured here.

  # Relay the host ssh-agent into each session (SSH_AUTH_SOCK), so `git commit`
  # can sign and SSH pushes work inside the container — like VS Code Dev
  # Containers. Enabled by default; set false to keep the agent off-limits to
  # container code.
  #forward_agent: true

  # Install cld's own user-default Claude Code config into each session:
  # <data_dir>/user-default/settings.json, CLAUDE.md, and the commands/,
  # agents/, and output-styles/ directories. This is a directory cld owns, not
  # your host's ~/.claude — cld never reads or writes that; populate
  # user-default by editing files there directly. settings.json is sanitized
  # first — secret/host-only keys are dropped so they never cross into the
  # container (env, the apiKeyHelper/aws*/otel auth helpers, the project-MCP
  # auto-trust flags); the rest carries over. Credentials, project history,
  # and runtime state are never propagated this way. Enabled by default; set
  # false to keep containers on cld's minimal seed only.
  #share_config: true

release:
  # Base URL of the Claude Code release channel.
  #base_url: https://downloads.claude.ai/claude-code-releases
  # Release channel to follow: "stable" or "latest".
  #channel: stable
  # How often to check the channel for a new version.
  #check_interval: 1h

gh:
  # Inject the GitHub CLI (`gh`) into a container whose workspace has a
  # GitHub remote. Enabled by default; set to true to turn it off.
  #disabled: false

sync:
  # Delay after a change before conversation state is copied out.
  #debounce: 3s
  # Polling interval used when the in-container watcher cannot run
  # (container architecture differs from the host).
  #fallback_interval: 1m
