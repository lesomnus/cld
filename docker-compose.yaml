services:
  cld:
    image: ghcr.io/lesomnus/cld:${REVISION:-edge}
    command: [serve]

    # The image entrypoint fixes ownership of the mounted dirs and joins the
    # Docker socket's group for you, then runs cld as PUID:PGID — so the sockets
    # under ~/.cache/cld end up owned by your host user with no pre-created dirs
    # and no docker-gid to look up. Set these to your ids (default 1000):
    #   CLD_UID=$(id -u) CLD_GID=$(id -g) docker compose up -d
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - XDG_CACHE_HOME=/data/cache
      - XDG_DATA_HOME=/data/share
      - CLD_HOST_HOME=/host-home
      - PUID=${CLD_UID:-1000}
      - PGID=${CLD_GID:-1000}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.cache/cld:/data/cache/cld
      - ${HOME}/.local/share/cld:/data/share/cld
      # The host home (only the home), read-only, so the daemon can read ~/.dotfiles.
      - ${HOME}:/host-home:ro

    restart: unless-stopped
