services:
  cld:
    image: ghcr.io/lesomnus/cld:${REVISION:-edge}
    command: [serve]

    # cld provisions and execs into other containers through the Docker API,
    # so it needs the daemon socket and enough privilege to do so.
    privileged: true
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Share the runtime dir so `cld ls` / `cld it` reach the daemon, and
      # keep the binary cache across restarts.
      - ${HOME}/.cache/cld:/root/.cache/cld
      # Persist conversation backups.
      - ${HOME}/.local/share/cld:/root/.local/share/cld

    restart: unless-stopped
